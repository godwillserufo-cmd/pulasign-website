<html>
<head>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <script src="script.js"></script>
</head>
<body>
    <nav>
        <div class="navbar">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li class="dropdown">
                    <a href="#" class="dropbtn" onclick="toggleCategoriesMenu()">Categories</a>
                    <div class="dropdown-content" id="categoriesMenu">
                        <a href="#" data-category="nova">Nova</a>
                        <a href="#" data-category="zara">Zara</a>
                        <a href="#" data-category="green">Green</a>
                        <!-- Add more categories here -->
                    </div>
                </li>
            </ul>
        </div>
    </nav>
    <div class="business-cards">
        <div class="business-card" data-category="nova">Nova Card Content</div>
        <div class="business-card" data-category="zara">Zara Card Content</div>
        <div class="business-card" data-category="green">Green Card Content</div>
    </div>
    <form id="categoryForm" onsubmit="return validateForm()">
        <label for="category">Choose a category (required):</label>
        <select id="category" name="category" required>
            <option value="">Select a category</option>
            <option value="nova">Nova</option>
            <option value="zara">Zara</option>
            <option value="green">Green</option>
        </select>
        <input type="submit" value="Submit">
    </form>
    <script>
        function toggleCategoriesMenu() {
            var menu = document.getElementById('categoriesMenu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        function closeCategories() {
            document.getElementById('categoriesMenu').style.display = 'none';
        }

        function filterByCategory(category) {
            var cards = document.getElementsByClassName('business-card');
            for (var i = 0; i < cards.length; i++) {
                cards[i].style.display = cards[i].getAttribute('data-category') === category ? 'block' : 'none';
            }
        }

        function validateForm() {
            var categorySelect = document.getElementById('category');
            if (categorySelect.value === '') {
                alert('Please select a category.');
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
